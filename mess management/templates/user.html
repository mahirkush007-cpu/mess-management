    <script>
  async function addUser() {
  const userId = document.getElementById("addUserId").value;
  const name = document.getElementById("addUserName").value;

  if (!userId || !name) {
    alert("Please enter both User ID and Name.");
    return;
  }

  try {
    const response = await fetch('/add_user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ user_id: userId, name: name })
    });

    if (!response.ok) {
      throw new Error(`Error: ${response.status}`);
    }

    const result = await response.json();
    alert(result.message || result.error);

    // Clear the input fields after successful submission
    document.getElementById("addUserId").value = "";
    document.getElementById("addUserName").value = "";

    console.log("Adding new user to the table");

    // Add the new user to the table
    addRowToTable(userId, name, "$0.00", "0");

  } catch (error) {
    alert(`Failed to add user. ${error}`);
  }
}

// Function to add a row to the table
function addRowToTable(userId, name, balance, meals) {
  // Get the table body
  const tbody = document.querySelector("table tbody");

  // Ensure tbody exists
  if (!tbody) {
    console.error("Table body not found!");
    return;
  }

  // Create a new row
  const newRow = document.createElement("tr");

  // Create cells for the new row
  const idCell = document.createElement("td");
  idCell.textContent = userId;

  const nameCell = document.createElement("td");
  nameCell.textContent = name;

  const balanceCell = document.createElement("td");
  balanceCell.textContent = balance;

  const mealsCell = document.createElement("td");
  mealsCell.textContent = meals;

  const viewCell = document.createElement("td");
  viewCell.textContent = "View";

  // Append cells to the row
  newRow.appendChild(idCell);
  newRow.appendChild(nameCell);
  newRow.appendChild(balanceCell);
  newRow.appendChild(mealsCell);
  newRow.appendChild(viewCell);

  // Append the row to the table body
  tbody.appendChild(newRow);
}
        async function removeUser() {
        const userId = document.getElementById("removeUserId").value;

        if (!userId) {
          alert("Please enter User ID.");
          return;
        }

        try {
          const response = await fetch('/remove_user', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ user_id: userId })
          });

          if (!response.ok) {
            throw new Error(`Error: ${response.status}`);
          }

          const result = await response.json();
          alert(result.message || result.error);

          // Clear the User ID field after successful removal
          document.getElementById("removeUserId").value = "";

          // Only clear `removeUserName` if the element is present
          const removeUserNameField = document.getElementById("removeUserName");
          if (removeUserNameField) {
            // Clear the `removeUserName` field only if it exists (whether enabled or disabled)
            removeUserNameField.value = "";
          }

        } catch (error) {
          // Log the error to the console for better debugging
          console.error("Error in removeUser:", error);
          alert(`Failed to remove user. ${error.message}`);
        }
      }
    </script>
