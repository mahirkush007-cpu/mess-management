<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />
    <title>Mess Management System</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body>
    <div class="relative flex size-full min-h-screen flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
        <div class="layout-container flex h-full grow flex-col">
            <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#e7edf3] px-10 py-3">
                <div class="flex items-center gap-4 text-[#0e141b]">
                    <div class="size-4">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                              d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"
                              fill="currentColor"
                            ></path>
                        </svg>
                    </div>
                    <h2 class="text-[#0e141b] text-lg font-bold leading-tight tracking-[-0.015em]">Mess Management System</h2>
                </div>
            <div class="flex flex-1 justify-end gap-8">
              <div class="flex items-center gap-9">
                <a class="text-[#111418] text-sm font-medium leading-normal" href="dash.html">Dashboard</a>
                <a class="text-[#111418] text-sm font-medium leading-normal" href="user.html">Users</a>
                <a class="text-[#111418] text-sm font-medium leading-normal" href="report.html">Reports</a>
                <a class="text-[#111418] text-sm font-medium leading-normal" href="feedback.html">Feedback</a>
                <a class="text-[#111418] text-sm font-medium leading-normal" href="meals.html">Meals</a>
              </div>
              <div
                class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10"
                style='background-image: url("https://cdn.usegalileo.ai/stability/1b9d6ca3-ecdf-44be-aa9d-e335ae0cba16.png");'
              ></div>
            </div>
          </header>

            <div class="flex flex-1">
                <aside class="w-1/4 bg-white-100 p-4">
                    
                </aside>
                <main class="layout-content-container flex flex-col max-w-[960px] flex-1">
                    <div class="flex flex-wrap justify-between gap-3 p-4">
                        <p class="text-[#111418] tracking-light text-[32px] font-bold leading-tight min-w-72">Feedback</p>
                    </div>
                    <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                        <label class="flex flex-col min-w-40 flex-1">
                            <textarea
                                id="feedback-text"
                                placeholder="What's on your mind?"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111418] focus:outline-0 focus:ring-0 border border-[#dbdfe6] bg-white focus:border-[#dbdfe6] min-h-36 placeholder:text-[#617189] p-[15px] text-base font-normal leading-normal"
                            ></textarea>
                        </label>
                    </div>
                    <div class="flex px-4 py-3 justify-between pr-99">
                        <button
                            id="submit-feedback"
                            class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#347cef] text-white text-sm font-bold leading-normal tracking-[0.015em]"
                        >
                            <span class="truncate">Submit</span>
                        </button>
                    </div>
                    <h3 class="text-[#111418] text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Your feedback</h3>
                    <div id="feedback-list">
                        <!-- Existing feedbacks will be listed here -->
                        <div class="flex items-center gap-4 bg-white px-4 min-h-[72px] py-2">
                            <div
                                class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-14 w-fit"
                                style='background-image: url("https://cdn.usegalileo.ai/stability/2f5296e5-bed9-467c-86f8-e970d9425458.png");'
                            ></div>
                            <div class="flex flex-col justify-center">
                                <p class="text-[#111418] text-base font-medium leading-normal line-clamp-1">It would be great to have a 'meal plan reminder' feature.</p>
                                <p class="text-[#617189] text-sm font-normal leading-normal line-clamp-2">1w ago</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 bg-white px-4 min-h-[72px] py-2">
                            <div
                                class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-14 w-fit"
                                style='background-image: url("https://cdn.usegalileo.ai/stability/690c4a85-7b8f-4919-a276-4137ad871d25.png");'
                            ></div>
                            <div class="flex flex-col justify-center">
                                <p class="text-[#111418] text-base font-medium leading-normal line-clamp-1">Please add an option to track my balance and meal count in real-time.</p>
                                <p class="text-[#617189] text-sm font-normal leading-normal line-clamp-2">1w ago</p>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Function to handle feedback submission
       // Function to handle feedback submission
document.getElementById("submit-feedback").addEventListener("click", async function() {
    const feedbackText = document.getElementById("feedback-text").value;
    if (feedbackText.trim() === "") {
        alert("Please enter some feedback.");
        return;
    }

    try {
        const response = await fetch('/add_feedback', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: feedbackText,
            }),
        });

        const result = await response.json();
        if (result.message) {
            alert("Feedback submitted successfully!");
            addFeedbackToList(feedbackText);  // Add new feedback to the list
            document.getElementById("feedback-text").value = "";  // Clear the textarea
        } else {
            alert("Failed to submit feedback.");
        }
    } catch (error) {
        console.error("Error:", error);
        alert("An error occurred. Please try again.");
    }
});

// Function to add feedback dynamically to the page
function addFeedbackToList(feedback) {
    const feedbackList = document.getElementById("feedback-list");

    const feedbackItem = document.createElement("div");
    feedbackItem.classList.add("flex", "items-center", "gap-4", "bg-white", "px-4", "min-h-[72px]", "py-2");
    feedbackItem.innerHTML = `
        <div
            class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-14 w-fit"
            style="background-image: url('https://cdn.usegalileo.ai/stability/1b9d6ca3-ecdf-44be-aa9d-e335ae0cba16.png');"
        ></div>
        <div class="flex flex-col justify-center">
            <p class="text-[#111418] text-base font-medium leading-normal line-clamp-1">${feedback}</p>
            <p class="text-[#617189] text-sm font-normal leading-normal line-clamp-2">Just now</p>
        </div>
    `;
    feedbackList.appendChild(feedbackItem);
}

    </script>
</body>
</html>
